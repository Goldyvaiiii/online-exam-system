<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher | Online Exam System</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">Teacher Dashboard</div>
        <div class="nav-links">
            <span id="userNameDisplay">Welcome, Teacher</span>
            <button id="logoutBtn" class="btn-small">Logout</button>
        </div>
    </nav>

    <div class="dashboard-container">
        <aside class="sidebar">
            <button class="menu-btn active" data-target="view-exams">My Exams</button>
            <button class="menu-btn" data-target="create-exam">Create New Exam</button>
            <button class="menu-btn" data-target="student-records">Global Records</button>
            <button class="menu-btn" data-target="complaints-manager">Student Complaints</button>
        </aside>

        <main class="content-area">
            <div id="messageBox" class="message" style="display: none;"></div>
            
            <section id="view-exams" class="panel active">
                <h2>Created Exams</h2>
                <div class="grid-container" id="examsList">
                </div>
            </section>

            <section id="create-exam" class="panel hidden">
                <h2>Create Assessment</h2>
                <form id="createExamForm" style="max-width: 500px;">
                    <div class="form-group">
                        <label>Exam Title</label>
                        <input type="text" id="examTitle" class="form-control" required placeholder="e.g. Science Test">
                    </div>
                    <div class="form-group">
                        <label>Subject</label>
                        <input type="text" id="examSubject" class="form-control" required placeholder="e.g. Science">
                    </div>
                    <div class="form-group">
                        <label>Duration (Minutes)</label>
                        <input type="number" id="examDuration" class="form-control" required min="1" value="30">
                    </div>
                    <button type="submit" class="btn">Save Exam</button>
                </form>
            </section>

            <section id="exam-manager" class="panel hidden">
                <button class="action-btn mb-1" id="backToExams">← Back to Exams</button>
                <h2 id="managerExamTitle">Exam Manager</h2>
                
                <div class="manager-layout">
                    <div class="manager-half">
                        <h3>Add Question</h3>
                        <form id="addQuestionForm">
                            <div class="form-group">
                                <label>Question Text</label>
                                <textarea id="qText" class="form-control" required rows="3"></textarea>
                            </div>
                            <div class="form-group option-group">
                                <label>Option A <small>(Select ratio to mark correct)</small></label>
                                <div class="option-row">
                                    <input type="radio" name="correctOpt" value="0" required>
                                    <input type="text" id="opt0" class="form-control" required>
                                </div>
                            </div>
                            <div class="form-group option-group">
                                <label>Option B</label>
                                <div class="option-row">
                                    <input type="radio" name="correctOpt" value="1">
                                    <input type="text" id="opt1" class="form-control" required>
                                </div>
                            </div>
                            <div class="form-group option-group">
                                <label>Option C</label>
                                <div class="option-row">
                                    <input type="radio" name="correctOpt" value="2">
                                    <input type="text" id="opt2" class="form-control" required>
                                </div>
                            </div>
                            <div class="form-group option-group">
                                <label>Option D</label>
                                <div class="option-row">
                                    <input type="radio" name="correctOpt" value="3">
                                    <input type="text" id="opt3" class="form-control" required>
                                </div>
                            </div>
                            <button type="submit" class="btn">Save Question</button>
                        </form>
                    </div>
                    <div class="manager-half">
                        <h3>Student Results</h3>
                        <div id="resultsList" class="results-container">
                        </div>
                    </div>
                </div>
            </section>

            <section id="student-records" class="panel hidden">
                <h2>Global Student Records</h2>
                <div class="manager-half" style="max-width: 800px;">
                    <div id="recordsContainer" class="results-container">Loading records...</div>
                </div>
            </section>

            <section id="complaints-manager" class="panel hidden">
                <h2>Support Tickets</h2>
                <div id="complaintList" class="results-container">Loading complaints...</div>
            </section>

        </main>
    </div>
    <script src="js/teacher.js"></script>
</body>
</html>
