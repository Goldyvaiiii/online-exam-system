<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student | Online Exam System</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">Student Portal</div>
        <div class="nav-links">
            <span id="userNameDisplay">Welcome, Student</span>
            <button id="logoutBtn" class="btn-small">Logout</button>
        </div>
    </nav>

    <div class="dashboard-container">
        <aside class="sidebar">
            <button class="menu-btn active" data-target="available-exams">Available Exams</button>
            <button class="menu-btn" data-target="my-results">My Results</button>
            <button class="menu-btn" data-target="lodge-complaint">Help / Support</button>
        </aside>

        <main class="content-area">
            <div id="messageBox" class="message" style="display: none;"></div>
            
            <section id="available-exams" class="panel active">
                <h2>Exams Ready to Take</h2>
                <div class="grid-container" id="examsList">
                </div>
            </section>

            <section id="my-results" class="panel hidden">
                <h2>My Examination History</h2>
                <div id="resultsList" class="results-container">
                </div>
            </section>

            <section id="lodge-complaint" class="panel hidden">
                <h2>Submit a Support Ticket</h2>
                <div class="manager-layout">
                    <div class="manager-half">
                        <form id="complaintForm">
                            <div class="form-group">
                                <label>Subject</label>
                                <input type="text" id="cSubject" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label>Message</label>
                                <textarea id="cMessage" class="form-control" rows="4" required></textarea>
                            </div>
                            <button type="submit" class="btn">Send Ticket</button>
                        </form>
                    </div>
                    <div class="manager-half">
                        <h3>My Tickets</h3>
                        <div id="myComplaintsList" class="results-container"></div>
                    </div>
                </div>
            </section>

        </main>
    </div>
    <script src="js/student.js"></script>
</body>
</html>
