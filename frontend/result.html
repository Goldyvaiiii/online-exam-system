<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result | Online Exam System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="flex-direction: column; text-align: center;">

    <div class="auth-container" style="max-width: 600px;">
        <h1 style="color: var(--text-primary); margin-bottom: 1rem;">Exam Completed</h1>
        <p style="color: var(--text-secondary);">Your answers have been successfully submitted and graded.</p>
        
        <div style="font-size: 5rem; font-weight: 700; color: var(--success-color); margin: 2rem 0;">
            <span id="scoreDisplay">0</span> / <span id="totalDisplay">0</span>
        </div>
        
        <p id="percentageDisplay" style="font-size: 1.2rem; color: var(--text-primary); font-weight: 600; margin-bottom: 2.5rem;">0% Final Score</p>

        <a href="student-dashboard.html" class="btn" style="display:inline-block; text-decoration:none;">Back to Dashboard</a>
    </div>

    <script>
        const resultString = sessionStorage.getItem('lastResult');
        if (!resultString) {
            window.location.href = 'student-dashboard.html';
        } else {
            const data = JSON.parse(resultString);
            document.getElementById('scoreDisplay').textContent = data.score;
            document.getElementById('totalDisplay').textContent = data.total_questions;
            
            if (data.total_questions > 0) {
                const perc = Math.round((data.score / data.total_questions) * 100);
                document.getElementById('percentageDisplay').textContent = `${perc}% Final Grade`;
            }
        }
    </script>
</body>
</html>
