<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Active Session | Nexus AI</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Specific Exam UI Overrides giving it an intense "Live Test" feel */
        .exam-header {
            position: fixed;
            top: 0; left: 0; width: 100%;
            background: rgba(11, 15, 25, 0.9);
            backdrop-filter: blur(10px);
            padding: 1rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent-glow);
            z-index: 1000;
        }

        /* Essential feature: sticky pulse timer */
        .timer-display {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--error-color);
            text-shadow: 0 0 10px rgba(239, 68, 68, 0.4);
        }

        /* This visually warns a student time is almost out in exam.js! */
        @keyframes pulse { from { opacity: 0.5; transform: scale(0.95); } to { opacity: 1; transform: scale(1.05); } }

        .question-container {
            margin-top: 100px;
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            padding: 3rem;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: left;
        }

        .question-text {
            font-size: 1.4rem;
            margin-bottom: 2rem;
            color: var(--text-primary);
        }

        .option-label {
            display: block;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .option-label:hover {
            border-color: var(--accent-glow);
            background: rgba(59, 130, 246, 0.1);
        }

        .option-label input[type="radio"] {
            margin-right: 1rem;
            transform: scale(1.2);
            cursor: pointer;
        }

        .exam-controls {
            display: flex;
            justify-content: space-between;
            margin-top: 2rem;
        }

        .btn-exam {
            padding: 0.8rem 1.5rem;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-exam:hover { background: rgba(59, 130, 246, 0.3); }

        .btn-submit {
            background: var(--success-color);
            border-color: var(--success-color);
            color: #000;
            font-weight: 700;
            animation: fadeIn 0.4s;
        }
        .btn-submit:hover { background: #16a34a; }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="exam-header">
        <h2 id="examTitleNav">Nexus Evaluator...</h2>
        <div class="timer-display" id="timer">--:--</div>
    </div>

    <!-- Active Question Card -->
    <!-- We hide it initially until our JS finishes downloading the test from API -->
    <div class="question-container" id="qContainer" style="display: none;">
        <h4 style="color: var(--text-secondary); margin-bottom: 1rem;" id="qCounter">Segment - of -</h4>
        <div class="question-text" id="qText">Downloading test module...</div>
        
        <div id="optionsWrapper">
            <!-- Dynamic radio UI renders here -->
        </div>

        <!-- Pagination UI -->
        <div class="exam-controls">
            <button class="btn-exam" id="prevBtn">← Previous Segment</button>
            <button class="btn-exam" id="nextBtn" style="background: var(--primary-gradient);">Proceed →</button>
            
            <!-- Only shown on final question -->
            <button class="btn-exam btn-submit" id="submitBtn" style="display:none;">TRANSMIT FINAL RESULTS</button>
        </div>
    </div>

    <script src="js/exam.js"></script>
</body>
</html>
