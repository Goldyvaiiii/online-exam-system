<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Nexus AI Exams</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Background Animated Orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="auth-container">
        <div class="auth-header">
            <h1>Join Nexus</h1>
            <p>Register as a Teacher or Student</p>
        </div>

        <div id="messageBox" class="message"></div>

        <form id="registerForm">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" class="form-control" required placeholder="John Doe">
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" class="form-control" required placeholder="name@example.com">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-control" required placeholder="••••••••">
            </div>

            <div class="form-group">
                <label for="role">Select Role</label>
                <select id="role" class="form-control" required>
                    <option value="" disabled selected>Choose your role...</option>
                    <option value="student">Student</option>
                    <option value="teacher">Teacher</option>
                </select>
            </div>

            <button type="submit" class="btn">Establish Uplink</button>
        </form>

        <div class="auth-footer">
            <p>Already in the network? <a href="index.html">Log in here</a></p>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
