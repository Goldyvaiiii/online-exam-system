<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus | Modern Assessment Platform</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <style>
        body {
            /* Reset body alignment from style.css to support a full scrolling page */
            display: block;
            justify-content: initial;
            align-items: initial;
        }

        .landing-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 4rem;
            background: transparent;
            width: 100%;
            position: absolute;
            top: 0; left: 0;
            z-index: 100;
        }

        .landing-nav .brand {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-primary);
        }
        .landing-nav .brand img {
            width: 40px; height: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(99,102,241,0.2);
        }

        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            min-height: 100vh;
            padding: 2rem 1rem;
            position: relative;
        }

        .hero-logo {
            width: 100px;
            height: 100px;
            border-radius: 25px;
            margin-bottom: 2rem;
            box-shadow: 0 20px 40px -10px rgba(99,102,241,0.4);
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .hero h1 {
            font-size: 4rem;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            max-width: 800px;
        }

        .hero p {
            font-size: 1.3rem;
            color: var(--text-secondary);
            max-width: 600px;
            margin-bottom: 3rem;
            line-height: 1.6;
        }

        .hero-buttons {
            display: flex;
            gap: 1.5rem;
        }

        .btn-large {
            padding: 1.2rem 3rem;
            font-size: 1.1rem;
            border-radius: 12px;
            text-decoration: none;
            display: inline-block;
        }

        .btn-outline {
            background: transparent;
            color: var(--accent-glow);
            border: 2px solid var(--accent-glow);
            box-shadow: none;
        }

        .btn-outline:hover {
            background: rgba(99, 102, 241, 0.05);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(99,102,241,0.1);
        }

        @media (max-width: 768px) {
            .hero h1 { font-size: 2.5rem; }
            .landing-nav { padding: 1.5rem; }
            .hero-buttons { flex-direction: column; width: 100%; max-width: 300px; }
            .btn-large { width: 100%; }
        }
    </style>
</head>
<body>

    <nav class="landing-nav">
        <div class="brand">
            <img src="images/startup_logo.png" alt="Nexus Logo">
            Nexus
        </div>
        <div class="nav-links">
            <a href="login.html" style="text-decoration: none; color: var(--text-secondary); font-weight: 600; margin-right: 1.5rem;">Log In</a>
            <a href="register.html" class="btn btn-small" style="text-decoration:none; padding: 0.8rem 1.5rem; border-radius: 8px;">Sign Up</a>
        </div>
    </nav>

    <div class="hero">
        <img src="images/startup_logo.png" alt="Nexus AI Logo" class="hero-logo">
        <h1>The Next Generation of Examination</h1>
        <p>A powerful, beautifully designed assessment platform built to seamlessly connect teachers and students with pristine analytics and support.</p>
        <div class="hero-buttons">
            <a href="register.html" class="btn btn-large">Get Started for Free</a>
            <a href="login.html" class="btn btn-large btn-outline">Go to Dashboard</a>
        </div>
    </div>

</body>
</html>
